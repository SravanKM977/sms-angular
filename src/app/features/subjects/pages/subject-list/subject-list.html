<h1>Subjects</h1>

<form #subjectForm="ngForm" (ngSubmit)="Submit(subjectForm)">
  <div class="form-group">
    <label for="id">Id</label>
    <input
      type="text"
      id="id"
      name="id"
      class="form-control"
      [(ngModel)]="subject.id"
      required
    />
    <label for="code">Code</label>
    <input
      type="text"
      id="code"
      name="code"
      class="form-control"
      [(ngModel)]="subject.code"
      required
    />
    <label for="name">Name</label>
    <input
      type="text"
      id="name"
      name="name"
      class="form-control"
      [(ngModel)]="subject.name"
      required
    />
    <label for="description">Description</label>
    <input
      type="text"
      id="description"
      name="description"
      class="form-control"
      [(ngModel)]="subject.description"
      required
    />

    <label for="department">Department</label>
    <input
      type="text"
      id="department"
      name="department"
      class="form-control"
      [(ngModel)]="subject.department"
      required
    />

    <label for="grade">Grade</label>
    <input
      type="text"
      id="grade"
      name="grade"
      class="form-control"
      [(ngModel)]="subject.grade"
      required
    />
  </div>

  <button type="submit" class="btn btn-primary" [disabled]="subjectForm.invalid" (click)="Submit(subjectForm)">
    Add Subject
  </button>
</form>

<table class="table">
  <thead>
    <tr>
      <th scope="col">Id</th>
      <th scope="col">Code</th>
      <th scope="col">Name</th>
      <th scope="col">Description</th>
      <th scope="col">Department</th>
      <th scope="col">Grade</th>
    </tr>
  </thead>
  <tbody>
    @for (subject of subjectsData$ | async; track subject.id) {
    <tr>
      <th scope="row">{{ subject.id }}</th>
      <td>{{ subject.code }}</td>
      <td>{{ subject.name }}</td>
      <td>{{ subject.description }}</td>
      <td>{{ subject.department }}</td>
      <td>{{ subject.grade }}</td>
      <td>
        <img src="assets/pencil.png" alt="Edit" (click)="editSubject(subject)" />
      </td>
    </tr>
  }
  </tbody>
</table>
